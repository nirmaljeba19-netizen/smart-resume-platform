<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up | PulseCV</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar non-print">
      <div class="container nav-shell">
        <div class="brand">
          <span class="brand-dot"></span>
          <a href="index.html">PulseCV</a>
        </div>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="login.html">Login</a>
        </div>
      </div>
    </nav>

    <main class="container" style="max-width: 560px; padding: 40px 0 80px;">
      <div class="panel">
        <div class="pill">Create account</div>
        <h1>Tailor your next role faster</h1>
        <p class="muted">Save role presets, drafts, and portfolio snippets in your browser.</p>
        <form id="signupForm">
          <div class="field">
            <label for="signupName">Full name</label>
            <input id="signupName" type="text" name="name" placeholder="Alex Rivera" required />
          </div>
          <div class="field">
            <label for="signupEmail">Email</label>
            <input id="signupEmail" type="email" name="email" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label for="signupPassword">Password</label>
            <input id="signupPassword" type="password" name="password" placeholder="••••••••" minlength="6" required />
          </div>
          <button class="btn btn-primary" type="submit" style="width: 100%;">Sign up</button>
        </form>
        <div class="divider"></div>
        <p class="muted">
          Already have an account?
          <a href="login.html">Login</a>
          · or ·
          <a href="dashboard.html">Try as guest</a>
        </p>
        <p class="hint">Passwords are stored locally using simple hashing for demo; avoid real credentials.</p>
      </div>
    </main>

    <script src="js/auth.js"></script>
  </body>
</html>
